[package]
name = "bplus_tree"
version = "0.1.0"
edition = "2024"

[features]
testing = ["fail"]   # testing feature pulls in fail
default = []
[dependencies]
fail = { version = "0.5", optional = true }
bincode = "1.3"
serde = { version = "1.0", features = ["derive"] }
lru = "0.8"
bytemuck = { version = "1.14", features = ["derive"] }
zerocopy = { version = "0.7", features = ["derive"] }
anyhow = "1.0"
thiserror = "1.0"
rand = "0.8"
crc32fast = "1.3"
mockall = "0.13.1"
tempfile = "3.11"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "time"] }
reqwest = { version = "0.12", features = ["json", "rustls-tls"] }

[profile.dev]
opt-level = 3

[profile.release]
opt-level = 3

[dev-dependencies.bplus_tree]
path = "."
features = ["testing", "fail" ]

[dev-dependencies]
criterion = "0.5"

[lib]
name = "bplustree"
path = "src/lib.rs"
