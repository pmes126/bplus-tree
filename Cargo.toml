[package]
name = "bplus_tree"
version = "0.1.0"
edition = "2024"

[features]
default = []
[dependencies]
bincode = "1.3"
serde = { version = "1.0", features = ["derive"] }
lru = "0.8"
bytemuck = { version = "1.14", features = ["derive"] }
zerocopy = { version = "0.7", features = ["derive"] }
anyhow = "1.0"
thiserror = "1.0"
rand = "0.8"
criterion = "0.4"
crc32fast = "1.3"
mockall = "0.13.1"
tempfile = "3.11"

[profile.dev]
opt-level = 0

[profile.release]
opt-level = 3
